<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --glass-bg:     rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.16);
      --glass-hover:  rgba(255, 255, 255, 0.14);
      --active-bg:    rgba(255, 255, 255, 0.18);
      --active-border:rgba(255, 255, 255, 0.35);
      --text-dim:     rgba(255, 255, 255, 0.45);
      --text-bright:  rgba(255, 255, 255, 0.95);
      --accent:       #a78bfa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #06040f;
      font-family: 'DM Sans', sans-serif;
      cursor: none; /* hide default cursor — we draw our own */
    }

    /* ── Background canvas ── */
    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── Particle canvas (mouse trail) ── */
    #particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* ── Custom cursor ── */
    #cursor {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      transform: translate(-50%, -50%);
      z-index: 9999;
      pointer-events: none;
      transition: transform 0.1s ease, opacity 0.2s ease;
      mix-blend-mode: difference;
    }

    /* ── Nav bar wrapper ── */
    .nav-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
    }

    /* The frosted glass pill */
    .nav-bar {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 6px;
      border-radius: 50px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 8px 32px rgba(0,0,0,0.4),
        0 2px 8px rgba(0,0,0,0.3);
      position: relative;
    }

    /* Sliding active indicator */
    .nav-indicator {
      position: absolute;
      top: 6px;
      height: calc(100% - 12px);
      border-radius: 40px;
      background: var(--active-bg);
      border: 1px solid var(--active-border);
      box-shadow: 0 0 12px rgba(167,139,250,0.2);
      transition:
        left   0.42s cubic-bezier(0.4, 0, 0.2, 1),
        width  0.42s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      z-index: 0;
    }

    /* Individual nav button */
    .nav-btn {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 18px;
      border-radius: 40px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: none;
      transition: color 0.25s ease;
      white-space: nowrap;
      user-select: none;
    }

    .nav-btn:hover { color: rgba(255,255,255,0.75); }
    .nav-btn.active { color: var(--text-bright); }

    .nav-icon {
      width: 16px;
      height: 16px;
      opacity: 0.7;
      transition: opacity 0.25s ease;
      flex-shrink: 0;
    }

    .nav-btn.active .nav-icon { opacity: 1; }

    /* ── Page content (behind nav) ── */
    .page-content {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      pointer-events: none;
    }

    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.5rem, 7vw, 5.5rem);
      color: rgba(255,255,255,0.08);
      letter-spacing: -0.02em;
      text-align: center;
      line-height: 1.1;
      user-select: none;
    }

    .page-sub {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.08);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <canvas id="bg"></canvas>
  <canvas id="particles"></canvas>
  <div id="cursor"></div>

  <!-- Ghosted background text for depth -->
  <div class="page-content">
    <div class="page-title" id="pageTitle">About Me</div>
    <div class="page-sub">Portfolio</div>
  </div>

  <!-- Frosted glass nav bar -->
  <div class="nav-wrap">
    <nav class="nav-bar" id="navBar">
      <div class="nav-indicator" id="navIndicator"></div>

      <button class="nav-btn active" data-idx="0">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        About Me
      </button>

      <button class="nav-btn" data-idx="1">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Projects
      </button>

      <button class="nav-btn" data-idx="2">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        Skills
      </button>

      <button class="nav-btn" data-idx="3">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
        </svg>
        Contact
      </button>
    </nav>
  </div>

  <script>
    /* ═══════════════════════════════════════
       BACKGROUND — animated mesh gradient
    ═══════════════════════════════════════ */
    const bgCanvas = document.getElementById('bg');
    const bgCtx    = bgCanvas.getContext('2d');

    const blobs = [
      { x: 0.18, y: 0.25, hue: 270, r: 0.50, sx: 0.00028, sy: 0.00019, px: 0.0, py: 1.2 },
      { x: 0.75, y: 0.65, hue: 210, r: 0.44, sx: 0.00022, sy: 0.00031, px: 2.3, py: 0.7 },
      { x: 0.50, y: 0.80, hue: 300, r: 0.42, sx: 0.00035, sy: 0.00024, px: 4.1, py: 3.0 },
      { x: 0.85, y: 0.20, hue: 190, r: 0.38, sx: 0.00018, sy: 0.00040, px: 1.5, py: 4.8 },
      { x: 0.30, y: 0.70, hue: 240, r: 0.46, sx: 0.00031, sy: 0.00017, px: 3.7, py: 2.1 },
    ];

    function resizeBg() {
      bgCanvas.width  = window.innerWidth;
      bgCanvas.height = window.innerHeight;
    }
    resizeBg();

    function drawBg(t) {
      const W = bgCanvas.width, H = bgCanvas.height;
      bgCtx.fillStyle = '#06040f';
      bgCtx.fillRect(0, 0, W, H);

      bgCtx.globalCompositeOperation = 'screen';
      blobs.forEach(b => {
        const hue = (b.hue + t * 0.012) % 360;
        const cx  = (b.x + Math.sin(t * b.sx + b.px) * 0.18) * W;
        const cy  = (b.y + Math.cos(t * b.sy + b.py) * 0.14) * H;
        const rad = b.r * Math.min(W, H);
        const g   = bgCtx.createRadialGradient(cx, cy, 0, cx, cy, rad);
        g.addColorStop(0,    `hsla(${hue},80%,38%,0.85)`);
        g.addColorStop(0.45, `hsla(${hue},75%,28%,0.35)`);
        g.addColorStop(1,    `hsla(${hue},70%,20%,0)`);
        bgCtx.fillStyle = g;
        bgCtx.beginPath();
        bgCtx.arc(cx, cy, rad, 0, Math.PI * 2);
        bgCtx.fill();
      });

      bgCtx.globalCompositeOperation = 'source-over';
      requestAnimationFrame(drawBg);
    }
    requestAnimationFrame(drawBg);

    /* ═══════════════════════════════════════
       PARTICLES — mouse trail
    ═══════════════════════════════════════ */
    const pCanvas = document.getElementById('particles');
    const pCtx    = pCanvas.getContext('2d');

    function resizeP() {
      pCanvas.width  = window.innerWidth;
      pCanvas.height = window.innerHeight;
    }
    resizeP();

    window.addEventListener('resize', () => { resizeBg(); resizeP(); updateIndicator(current); });

    let mouse = { x: -200, y: -200 };
    let particles = [];

    document.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      document.getElementById('cursor').style.left = mouse.x + 'px';
      document.getElementById('cursor').style.top  = mouse.y + 'px';

      // Spawn 2–3 particles per move
      const count = 2 + Math.floor(Math.random() * 2);
      for (let i = 0; i < count; i++) spawnParticle(mouse.x, mouse.y);
    });

    function spawnParticle(x, y) {
      const angle  = Math.random() * Math.PI * 2;
      const speed  = 0.4 + Math.random() * 1.2;
      const hue    = 240 + Math.random() * 100; // violet → indigo → blue range
      const size   = 1.5 + Math.random() * 3;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 0.6, // slight upward drift
        life: 1.0,
        decay: 0.018 + Math.random() * 0.022,
        size,
        hue,
        sat:  70 + Math.random() * 30,
        lit:  70 + Math.random() * 25,
      });
    }

    function drawParticles() {
      pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);

      particles = particles.filter(p => p.life > 0);

      particles.forEach(p => {
        p.x   += p.vx;
        p.y   += p.vy;
        p.vy  += 0.015; // gentle gravity
        p.life -= p.decay;
        p.vx  *= 0.98;

        const alpha = Math.max(0, p.life);
        pCtx.save();
        pCtx.globalAlpha = alpha * 0.8;
        pCtx.beginPath();
        pCtx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);

        // Glow
        const g = pCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * alpha * 2.5);
        g.addColorStop(0,   `hsla(${p.hue},${p.sat}%,${p.lit}%,1)`);
        g.addColorStop(0.5, `hsla(${p.hue},${p.sat}%,${p.lit}%,0.4)`);
        g.addColorStop(1,   `hsla(${p.hue},${p.sat}%,${p.lit}%,0)`);
        pCtx.fillStyle = g;
        pCtx.fill();
        pCtx.restore();
      });

      requestAnimationFrame(drawParticles);
    }
    requestAnimationFrame(drawParticles);

    /* ═══════════════════════════════════════
       NAV — frosted bar
    ═══════════════════════════════════════ */
    const pages   = ['About Me', 'Projects', 'Skills', 'Contact'];
    let current   = 0;

    const navBar      = document.getElementById('navBar');
    const indicator   = document.getElementById('navIndicator');
    const btns        = document.querySelectorAll('.nav-btn');
    const pageTitle   = document.getElementById('pageTitle');

    function updateIndicator(idx) {
      const btn  = btns[idx];
      const bar  = navBar.getBoundingClientRect();
      const btnR = btn.getBoundingClientRect();
      indicator.style.left  = (btnR.left - bar.left) + 'px';
      indicator.style.width = btnR.width + 'px';
    }

    function goTo(idx) {
      if (idx === current) return;
      current = idx;
      btns.forEach((b, i) => b.classList.toggle('active', i === idx));
      updateIndicator(idx);
      pageTitle.textContent = pages[idx];
    }

    btns.forEach(btn => {
      btn.addEventListener('click', () => goTo(parseInt(btn.dataset.idx)));
    });

    // Init indicator position after fonts load
    window.addEventListener('load', () => updateIndicator(0));
    setTimeout(() => updateIndicator(0), 100);
  </script>
</body>
</html>
