<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noisy Mesh Gradient</title>
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #222; /* Fallback dark background */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* 1. The Mesh Gradient Container */
        .mesh-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: 1;
            /* A subtle base gradient to tie it all together */
            background: linear-gradient(135deg, #a361e6, #4b369d);
        }

        /* 2. The Color Orbs */
        .color-orb {
            position: absolute;
            border-radius: 50%;
            /* This massive blur is what blends the shapes into a smooth mesh gradient */
            filter: blur(120px); 
            opacity: 0.9;
            /* Hardware acceleration for smoother animation */
            will-change: transform; 
        }

        /* Matching the colors from your image */
        .orb-pink {
            top: -20%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: #ff529a;
            animation: moveOrb1 15s infinite alternate ease-in-out;
        }

        .orb-yellow {
            top: -10%;
            right: -10%;
            width: 55vw;
            height: 55vw;
            background: #d4e845;
            animation: moveOrb2 18s infinite alternate ease-in-out;
        }

        .orb-blue {
            bottom: -20%;
            left: -10%;
            width: 65vw;
            height: 65vw;
            background: #4732f1;
            animation: moveOrb3 20s infinite alternate ease-in-out;
        }

        .orb-cyan {
            bottom: -15%;
            right: -15%;
            width: 60vw;
            height: 60vw;
            background: #00d4ff;
            animation: moveOrb4 17s infinite alternate ease-in-out;
        }

        /* 3. The Animations */
        @keyframes moveOrb1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(15vw, 15vh) scale(1.1); }
        }
        @keyframes moveOrb2 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-10vw, 20vh) scale(1.2); }
        }
        @keyframes moveOrb3 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(20vw, -10vh) scale(1.15); }
        }
        @keyframes moveOrb4 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-15vw, -15vh) scale(1.05); }
        }

        /* 4. The Noise Overlay */
        .noise-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            /* SVG fractal noise generated directly in the CSS */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            /* Increased opacity and overlay blend mode to match your reference */
            opacity: 0.35; 
            mix-blend-mode: overlay;
        }

        /* Sample Foreground Content */
        .content {
            position: relative;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 1px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="mesh-container">
        <div class="color-orb orb-pink"></div>
        <div class="color-orb orb-yellow"></div>
        <div class="color-orb orb-blue"></div>
        <div class="color-orb orb-cyan"></div>
    </div>

    <div class="noise-overlay"></div>

    <div class="content">
        <h1>Mesh Gradient</h1>
    </div>

</body>
</html>
