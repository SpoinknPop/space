<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ᯓ★</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- SimpleBar -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simplebar@latest/dist/simplebar.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/simplebar@latest/dist/simplebar.min.js"></script>

  <style>
    :root {
      --glass-bg:      rgba(255,255,255,0.10);
      --glass-border:  rgba(255,255,255,0.20);
      --active-bg:     rgba(255,255,255,0.20);
      --active-border: rgba(255,255,255,0.40);
      --text-dim:      rgba(255,255,255,0.50);
      --text-bright:   rgba(255,255,255,0.97);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden; /* body no longer scrolls — SimpleBar handles it */
      font-family: 'DM Sans', sans-serif;
      cursor: default;
    }

    body {
      background-color: #c040e0;
      background-image:
        radial-gradient(ellipse at var(--b1x) var(--b1y), #ff4db8 0%, transparent 55%),
        radial-gradient(ellipse at var(--b2x) var(--b2y), #ffe033 0%, transparent 50%),
        radial-gradient(ellipse at var(--b3x) var(--b3y), #33ff99 0%, transparent 52%),
        radial-gradient(ellipse at var(--b4x) var(--b4y), #3399ff 0%, transparent 54%),
        radial-gradient(ellipse at var(--b5x) var(--b5y), #aa44ff 0%, transparent 50%),
        radial-gradient(ellipse at var(--b6x) var(--b6y), #00eeff 0%, transparent 48%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background-attachment: fixed;
    }

    #particleCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      z-index: 1;
      opacity: 0.15;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* ── SimpleBar scroll container ── */
    #scrollArea {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100vh; /* full viewport — SimpleBar scrolls inside this */
    }

    /* ── Custom SimpleBar scrollbar styling ── */
    .simplebar-scrollbar::before {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 100px;
      transition: background 0.2s ease, opacity 0.3s ease;
    }

    .simplebar-scrollbar.simplebar-visible::before {
      background: rgba(255, 255, 255, 0.25);
      opacity: 1;
    }

    .simplebar-track.simplebar-vertical {
      width: 8px;
      right: 8px;
    }

    .simplebar-track.simplebar-vertical .simplebar-scrollbar::before {
      top: 2px;
      bottom: 2px;
      left: 1px;
      right: 1px;
    }

    /* ── Page content ── */
    .page-content {
      width: 90%;
      max-width: 1000px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      margin: 5vh auto 0;
      padding: 40px 0 160px 0;
    }

    .hero-section {
      text-align: left;
      margin-bottom: 0.5rem;
    }

    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      color: rgba(255,255,255,0.95);
      line-height: 1.1;
      margin-bottom: 0.5rem;
      transition: opacity 0.3s ease;
    }

    .page-sub {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.4em;
      text-transform: uppercase;
    }

    #mainContent {
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 3rem;
      align-items: flex-start;
    }

    .about-text {
      color: rgba(255,255,255,0.85);
      font-size: 1.05rem;
      line-height: 1.6;
      font-weight: 300;
    }

    .intro-para { margin-bottom: 1.5rem; }

    .info-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      overflow: hidden;
    }

    .info-table td {
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 0.95rem;
    }

    .info-table tr:last-child td { border-bottom: none; }

    .label-cell {
      color: rgba(255, 255, 255, 0.4);
      width: 35%;
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.75rem !important;
      letter-spacing: 0.1em;
    }

    .value-cell {
      color: rgba(255, 255, 255, 0.9);
      font-family: 'DM Sans', sans-serif;
    }

    .clock-container {
      margin-bottom: 1rem;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      backdrop-filter: blur(5px);
      width: 100%;
    }

    #clock-time {
      font-family: 'DM Sans', monospace;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.95);
      font-size: 1rem;
      letter-spacing: 0.05em;
    }

    .clock-label {
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 2px;
    }

    .project-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      margin-bottom: 2rem;
    }

    .project-card:hover { transform: translateY(-5px); }

    .project-card.split-card {
      flex-direction: row;
      align-items: center;
    }

    .project-banner-container {
      width: 100%;
      aspect-ratio: 1840 / 838;
      background: rgba(0, 0, 0, 0.1);
      overflow: hidden;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .split-card .project-banner-container {
      width: 30%;
      aspect-ratio: 1 / 1;
      border-bottom: none;
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      background: transparent;
    }

    .project-banner-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .project-card:hover .project-banner-img { transform: scale(1.03); }

    .project-content {
      padding: 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .project-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .project-card h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      color: white;
    }

    .project-meta {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-weight: 600;
      margin-bottom: 12px;
      display: block;
    }

    .project-links {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .project-link-btn {
      padding: 8px 18px;
      border-radius: 100px;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .project-link-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.4);
      transform: translateY(-2px);
    }

    .social-column {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 24px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      border-radius: 100px;
      text-decoration: none;
      color: white;
      font-weight: 500;
      font-size: 0.9rem;
      transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1), inset 0 0 0 1px rgba(255,255,255,0.15);
      border: none;
      background-clip: padding-box;
      position: relative;
    }

    .social-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    }

    .btn-icon-png { width: 20px; height: 20px; object-fit: contain; }
    .btn-spotify  { background-color: #1DB954; background-image: linear-gradient(135deg, #1DB954 0%, #111111 100%); }
    .btn-discord  { background-color: #5865F2; background-image: linear-gradient(135deg, #5865F2 0%, #3a45c3 100%); }
    .btn-valorant { background-color: #ff4655; background-image: linear-gradient(135deg, #ff4655 0%, #bd3944 100%); }
    .btn-github   { background-color: #9333ea; background-image: linear-gradient(135deg, #7c3aed 0%, #c026d3 100%); }
    .btn-roblox   { background-color: #000000; background-image: linear-gradient(135deg, #000000 0%, #444444 100%); }

    .btn-label { display: flex; align-items: center; gap: 14px; z-index: 2; }
    .btn-arrow  { opacity: 0.7; font-size: 0.8rem; z-index: 2; display: flex; align-items: center; }

    /* Nav */
    .nav-wrap {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      width: auto;
      max-width: 90vw;
    }

    .nav-bar {
      display: flex; align-items: center; gap: 4px;
      padding: 8px;
      border-radius: 50px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      position: relative;
    }

    .nav-indicator {
      position: absolute; top: 8px;
      height: calc(100% - 16px);
      border-radius: 40px;
      background: var(--active-bg);
      border: 1px solid var(--active-border);
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      pointer-events: none; z-index: 0;
    }

    .nav-btn {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 10px 24px;
      border-radius: 40px; border: none; background: transparent;
      color: var(--text-dim);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem; font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.3s;
    }
    .nav-btn span { display: inline-block; position: relative; }
    .nav-btn span::after {
      content: attr(data-text);
      display: block;
      height: 0;
      overflow: hidden;
      visibility: hidden;
      font-weight: 600;
      color: var(--text-bright);
      pointer-events: none;
    }
    .nav-btn.active { color: var(--text-bright); }
    .nav-btn i { width: 16px; height: 16px; flex-shrink: 0; }

    @media (max-width: 768px) {
      #scrollArea { height: 100dvh; }
      .content-grid { grid-template-columns: 1fr; gap: 2rem; }
      .page-content { padding: 40px 0 160px 0; margin-top: 0; width: 92%; }
      .project-card.split-card { flex-direction: column; }
      .split-card .project-banner-container { width: 100%; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
      .nav-wrap { bottom: 20px; width: 95vw; }
      .nav-bar { gap: 2px; padding: 4px; justify-content: space-around; }
      .nav-btn { padding: 12px; gap: 0; flex: 1; justify-content: center; flex-direction: column; font-size: 0.7rem; }
      .nav-btn span { display: block; margin-top: 4px; }
      .nav-btn i { width: 20px; height: 20px; }
      .nav-indicator { top: 4px; height: calc(100% - 8px); }
      /* Thinner bar on mobile */
      .simplebar-track.simplebar-vertical { width: 4px; right: 3px; }
    }
  </style>
</head>

  <script>
    /* Particle System */
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let mouse = { x: -1000, y: -1000 };

    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.6;
        this.vy = (Math.random() - 0.5) * 0.6;
        this.radius = Math.random() * 1.5 + 0.5;
        this.life = 0;
        this.maxLife = 200 + Math.random() * 300;
        this.alpha = 0;
      }
      update() {
        this.life++;
        if (this.life >= this.maxLife) { this.alpha -= 0.003; if (this.alpha <= 0) this.reset(); }
        else if (this.alpha < 0.3) { this.alpha += 0.005; }
        const dx = this.x - mouse.x, dy = this.y - mouse.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const r = 180;
        if (dist < r) {
          const force = (r - dist) / 60000;
          this.vx -= dx * force; this.vy -= dy * force;
          if (dist < 40) { const b = (40-dist)/50; this.vx += dx*b*0.02; this.vy += dy*b*0.02; }
        }
        this.x += this.vx; this.y += this.vy;
        this.vx *= 0.985; this.vy *= 0.985;
        if (this.x < 0) this.x = canvas.width;
        if (this.x > canvas.width) this.x = 0;
        if (this.y < 0) this.y = canvas.height;
        if (this.y > canvas.height) this.y = 0;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${this.alpha})`;
        ctx.shadowBlur = 4; ctx.shadowColor = "white";
        ctx.fill();
      }
    }

    for (let i = 0; i < 60; i++) particles.push(new Particle());
    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    /* Background blobs */
    const basePos = [[15,30],[78,20],[50,70],[20,80],[75,50],[55,35]];
    const blobDefs = [
      { phase:[0.0,1.5], speed:[0.0004,0.0003] },
      { phase:[2.1,0.8], speed:[0.0003,0.0004] },
      { phase:[4.2,3.1], speed:[0.0002,0.0003] },
      { phase:[1.0,4.7], speed:[0.0004,0.0003] },
      { phase:[3.3,2.4], speed:[0.0003,0.0004] },
      { phase:[5.5,0.3], speed:[0.0005,0.0002] },
    ];
    function animBg(t) {
      blobDefs.forEach((b, i) => {
        const nx = basePos[i][0] + Math.sin(t * b.speed[0] + b.phase[0]) * 20;
        const ny = basePos[i][1] + Math.cos(t * b.speed[1] + b.phase[1]) * 15;
        document.body.style.setProperty(`--b${i+1}x`, `${nx}%`);
        document.body.style.setProperty(`--b${i+1}y`, `${ny}%`);
      });
      requestAnimationFrame(animBg);
    }

          <aside class="social-side-col">

              <i data-lucide="clock" style="width:16px;height:16px;color:rgba(255,255,255,0.6);"></i>

            <div class="social-column">
              <a href="#" target="_blank" class="social-btn btn-spotify">

                <span class="btn-arrow"><i data-lucide="external-link"></i></span>

              </p>
              <div class="project-links">
                <a href="https://discord.gg/5QAyBHYbEM" target="_blank" class="project-link-btn"><i data-lucide="message-square"></i> Join Discord</a>
                <a href="https://www.tiktok.com/@lapindemer" target="_blank" class="project-link-btn"><i data-lucide="video"></i> Follow on TikTok</a>
              </div>
            </div>
          </div>
        </div>
      `
    };

    function updateClock() {
      const el = document.getElementById('clock-time');
      if (!el) return;
      el.textContent = new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
      }).format(new Date());
    }
    setInterval(updateClock, 1000);

    const pages = ['About Me', 'Featured Projects'];
    const btns = document.querySelectorAll('.nav-btn');
    const indicator = document.getElementById('navIndicator');
    const titleEl = document.getElementById('pageTitle');
    const contentContainer = document.getElementById('mainContent');

    function updateIndicator(idx) {
      const btn = btns[idx];
      if (btn) { indicator.style.left = btn.offsetLeft + 'px'; indicator.style.width = btn.offsetWidth + 'px'; }
    }

    function switchPage(idx) {
      contentContainer.style.opacity = 0;
      contentContainer.style.transform = 'translateY(10px)';
      titleEl.style.opacity = 0;
      setTimeout(() => {
        titleEl.textContent = pages[idx];
        contentContainer.innerHTML = contentData[idx];
        lucide.createIcons();
        if (idx === 0) updateClock();

        /* Scroll SimpleBar back to top on page switch */
        const sb = SimpleBar.instances.get(document.getElementById('scrollArea'));
        if (sb) sb.getScrollElement().scrollTop = 0;

        contentContainer.style.opacity = 1;
        contentContainer.style.transform = 'translateY(0px)';
        titleEl.style.opacity = 1;
      }, 300);
    }

    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        switchPage(idx);
        updateIndicator(idx);
      });
    });

    window.onload = () => {
      updateIndicator(0);
      contentContainer.innerHTML = contentData[0];
      lucide.createIcons();
      updateClock();
    };

    window.addEventListener('resize', () => {
      const active = document.querySelector('.nav-btn.active');
      if (active) updateIndicator(parseInt(active.dataset.idx));
    });
  </script>
</body>
</html>
