<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* ── Full-page layout container (not fixed, so html2canvas captures it) ── */
    #page {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Animated mesh gradient background ── */
    #bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-color: #c040e0;
      background-image:
        radial-gradient(ellipse at var(--b1x) var(--b1y), #ff4db8 0%, transparent 55%),
        radial-gradient(ellipse at var(--b2x) var(--b2y), #ffe033 0%, transparent 50%),
        radial-gradient(ellipse at var(--b3x) var(--b3y), #33ff99 0%, transparent 52%),
        radial-gradient(ellipse at var(--b4x) var(--b4y), #3399ff 0%, transparent 54%),
        radial-gradient(ellipse at var(--b5x) var(--b5y), #aa44ff 0%, transparent 50%),
        radial-gradient(ellipse at var(--b6x) var(--b6y), #00eeff 0%, transparent 48%);
    }

    /* Grain overlay */
    #bg::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.35;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
    }

    /* ── Blue nav bar — absolute, centered, always static ── */
    .nav-bar {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 520px;
      height: 58px;
      border-radius: 29px;
      background: #1d4ed8;
      z-index: 10;
      display: flex;
      align-items: center;
    }

    .nav-item {
      flex: 1;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: rgba(255, 255, 255, 0.55);
      white-space: nowrap;
      user-select: none;
    }

    /* ── Glass pill wrapper — absolute, handles left/width slide ── */
    .glass-wrapper {
      position: absolute;
      top: 50%;
      height: 80px;
      z-index: 20;
      pointer-events: none;
      transform: translateY(-50%);
      transition:
        left  0.46s cubic-bezier(0.4, 0, 0.2, 1),
        width 0.46s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Glass pill — liquidGL target, handles the smoosh ── */
    .glass-pill {
      width: 100%;
      height: 100%;
      border-radius: 40px;
      transform-origin: center center;
      /* transitions managed fully by JS */
    }

    .glass-inner {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .glass-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.95);
      letter-spacing: 0.02em;
      white-space: nowrap;
      transition: opacity 0.12s ease;
    }

    .glass-label.fading { opacity: 0; }

    /* ── Click overlay — fixed on top, maps to nav bar position ── */
    .click-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 520px;
      height: 58px;
      z-index: 999;
      display: flex;
      align-items: stretch;
    }

    .click-area {
      flex: 1;
      cursor: pointer;
    }

    @media (max-width: 580px) {
      .nav-bar, .click-overlay { width: 92vw; }
    }
  </style>
</head>
<body>

<div id="page">

  <!-- Background (registered as dynamic so glass refracts its animation) -->
  <div id="bg"></div>

  <!-- Blue bar — static, always shows all labels -->
  <div class="nav-bar" id="navBar">
    <div class="nav-item" data-idx="0">About Me</div>
    <div class="nav-item" data-idx="1">Projects</div>
    <div class="nav-item" data-idx="2">Skills</div>
    <div class="nav-item" data-idx="3">Contact</div>
  </div>

  <!-- Glass wrapper → pill (liquidGL target) -->
  <div class="glass-wrapper" id="glassWrapper">
    <div class="glass-pill" id="glassPill">
      <div class="glass-inner">
        <span class="glass-label" id="glassLabel">About Me</span>
      </div>
    </div>
  </div>

</div>

<!-- Click zones (fixed, sits above everything) -->
<div class="click-overlay">
  <div class="click-area" data-idx="0"></div>
  <div class="click-area" data-idx="1"></div>
  <div class="click-area" data-idx="2"></div>
  <div class="click-area" data-idx="3"></div>
</div>

<script src="scripts/html2canvas.min.js"></script>
<script src="scripts/liquidGL.js"></script>
<script>
  /* ── Background animation (CSS custom props) ── */
  const basePos = [
    [15, 30], [78, 20], [50, 70],
    [20, 80], [75, 50], [55, 35],
  ];
  const blobDefs = [
    { phase: [0.0, 1.5], speed: [0.00031, 0.00023] },
    { phase: [2.1, 0.8], speed: [0.00027, 0.00034] },
    { phase: [4.2, 3.1], speed: [0.00019, 0.00028] },
    { phase: [1.0, 4.7], speed: [0.00035, 0.00021] },
    { phase: [3.3, 2.4], speed: [0.00022, 0.00038] },
    { phase: [5.5, 0.3], speed: [0.00040, 0.00018] },
  ];
  const bg = document.getElementById('bg');

  blobDefs.forEach((_, i) => {
    bg.style.setProperty(`--b${i+1}x`, `${basePos[i][0]}%`);
    bg.style.setProperty(`--b${i+1}y`, `${basePos[i][1]}%`);
  });

  function animBg(t) {
    blobDefs.forEach((b, i) => {
      const nx = basePos[i][0] + Math.sin(t * b.speed[0] + b.phase[0]) * 22;
      const ny = basePos[i][1] + Math.cos(t * b.speed[1] + b.phase[1]) * 18;
      bg.style.setProperty(`--b${i+1}x`, `${nx}%`);
      bg.style.setProperty(`--b${i+1}y`, `${ny}%`);
    });
    requestAnimationFrame(animBg);
  }
  requestAnimationFrame(animBg);

  /* ── Nav ── */
  const pages      = ['About Me', 'Projects', 'Skills', 'Contact'];
  let   current    = 0;
  let   animating  = false;

  const navBar     = document.getElementById('navBar');
  const navItems   = document.querySelectorAll('.nav-item');
  const wrapper    = document.getElementById('glassWrapper');
  const pill       = document.getElementById('glassPill');
  const glassLabel = document.getElementById('glassLabel');
  const clickAreas = document.querySelectorAll('.click-area');

  const PAD = 14;

  function snapPill(idx) {
    const r = navItems[idx].getBoundingClientRect();
    const barRect = navBar.getBoundingClientRect();
    // Use offsets relative to #page (since wrapper is absolute inside it)
    const pageRect = document.getElementById('page').getBoundingClientRect();
    const itemLeft = r.left - pageRect.left;
    const itemTop  = r.top  - pageRect.top + r.height / 2;

    // Temporarily disable transitions
    const prevT = wrapper.style.transition;
    wrapper.style.transition = 'none';
    pill.style.transition = 'none';

    wrapper.style.left  = (itemLeft - PAD) + 'px';
    wrapper.style.width = (r.width + PAD * 2) + 'px';
    // Vertically center the wrapper on the item center
    wrapper.style.top   = itemTop + 'px';

    pill.style.transform    = 'scaleX(1) scaleY(1)';
    pill.style.borderRadius = '40px';
    pill.offsetHeight; // force reflow

    wrapper.style.transition = prevT;
  }

  function goTo(idx) {
    if (idx === current || animating) return;
    animating = true;
    current = idx;

    const r = navItems[idx].getBoundingClientRect();
    const pageRect = document.getElementById('page').getBoundingClientRect();
    const itemLeft = r.left - pageRect.left;

    // 1. Smoosh: squish tall → wide (taffy stretch)
    pill.style.transition = 'transform 0.18s cubic-bezier(0.4,0,0.6,1), border-radius 0.18s ease';
    pill.style.transform  = 'scaleX(1.14) scaleY(0.68)';
    pill.style.borderRadius = '55px';

    glassLabel.classList.add('fading');

    // 2. Slide to new position
    setTimeout(() => {
      wrapper.style.left  = (itemLeft - PAD) + 'px';
      wrapper.style.width = (r.width + PAD * 2) + 'px';
    }, 55);

    // 3. Bounce — arrive tall and narrow
    setTimeout(() => {
      pill.style.transition = 'transform 0.24s cubic-bezier(0.18,1.5,0.4,1), border-radius 0.24s ease';
      pill.style.transform  = 'scaleX(0.90) scaleY(1.14)';
      pill.style.borderRadius = '46px';
    }, 290);

    // 4. Settle
    setTimeout(() => {
      pill.style.transition = 'transform 0.18s cubic-bezier(0.4,0,0.2,1), border-radius 0.18s ease';
      pill.style.transform  = 'scaleX(1) scaleY(1)';
      pill.style.borderRadius = '40px';
      glassLabel.textContent = pages[idx];
      glassLabel.classList.remove('fading');
      animating = false;
    }, 480);
  }

  clickAreas.forEach(area => {
    area.addEventListener('click', () => goTo(parseInt(area.dataset.idx)));
  });

  /* ── Init liquidGL ── */
  document.addEventListener('DOMContentLoaded', () => {
    // Small delay so background paints before snapshot
    setTimeout(() => {
      snapPill(0);

      const glassEffect = liquidGL({
        snapshot: '#page',
        target: '.glass-pill',
        resolution: 2.0,
        refraction: 0.04,
        bevelDepth: 0.06,
        bevelWidth: 0.22,
        frost: 0,
        shadow: true,
        specular: true,
        tilt: false,
        reveal: 'fade',
      });

      // Register the animated background so glass refracts it in real-time
      liquidGL.registerDynamic('#bg');

    }, 150);
  });

  window.addEventListener('load', () => {
    snapPill(0);
    liquidGL.syncWith();
  });
</script>
</body>
</html>
