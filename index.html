<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
    }

    /* Full-page canvas — NOT fixed, so html2canvas captures it */
    #bgCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      display: block;
    }

    /* Glass pill — absolute, liquidGL target */
    .glass-pill {
      position: absolute;
      height: 80px;
      border-radius: 40px;
      z-index: 20;
      pointer-events: none;
      transform-origin: center center;
    }

    .glass-inner {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glass-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: rgba(255,255,255,0.95);
      letter-spacing: 0.02em;
      white-space: nowrap;
      transition: opacity 0.12s ease;
      pointer-events: none;
    }

    .glass-label.fading { opacity: 0; }

    /* Click overlay — fixed, maps exactly over the nav bar */
    .click-overlay {
      position: fixed;
      z-index: 999;
      display: flex;
    }

    .click-area {
      flex: 1;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!--
    One canvas covers the whole page.
    It draws:
      1. Animated colorful gradient background
      2. Grain noise
      3. The static blue nav bar (pill shape + text)
    liquidGL snapshots this canvas and refracts it through the glass pill.
  -->
  <canvas id="bgCanvas"></canvas>

  <!-- Glass pill sits on top — liquidGL target -->
  <div class="glass-pill" id="glassPill">
    <div class="glass-inner">
      <span class="glass-label" id="glassLabel">About Me</span>
    </div>
  </div>

  <!-- Invisible click zones, positioned by JS to match the nav bar on canvas -->
  <div class="click-overlay" id="clickOverlay">
    <div class="click-area" data-idx="0"></div>
    <div class="click-area" data-idx="1"></div>
    <div class="click-area" data-idx="2"></div>
    <div class="click-area" data-idx="3"></div>
  </div>

  <script src="scripts/html2canvas.min.js"></script>
  <script src="scripts/liquidGL.js"></script>
  <script>
    const pages = ['About Me', 'Projects', 'Skills', 'Contact'];
    let current  = 0;
    let animating = false;

    const canvas     = document.getElementById('bgCanvas');
    const ctx        = canvas.getContext('2d');
    const pill       = document.getElementById('glassPill');
    const glassLabel = document.getElementById('glassLabel');
    const overlay    = document.getElementById('clickOverlay');

    // Nav bar dimensions — computed once, reused everywhere
    const BAR_W  = 520;
    const BAR_H  = 58;
    const BAR_R  = 29;  // border-radius
    const PAD    = 14;  // glass overhangs nav item by this much each side
    const PILL_H = 80;

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      positionOverlay();
    }

    // Where is the nav bar on screen?
    function barLeft()   { return (canvas.width  - BAR_W) / 2; }
    function barTop()    { return (canvas.height - BAR_H) / 2; }
    function itemWidth() { return BAR_W / pages.length; }

    // Position click overlay to match the painted nav bar
    function positionOverlay() {
      overlay.style.left   = barLeft() + 'px';
      overlay.style.top    = barTop()  + 'px';
      overlay.style.width  = BAR_W + 'px';
      overlay.style.height = BAR_H + 'px';
    }

    // Snap glass pill over a nav item (no transition)
    function snapPill(idx) {
      const iw   = itemWidth();
      const left = barLeft() + iw * idx - PAD;
      const top  = barTop()  + (BAR_H - PILL_H) / 2;
      const w    = iw + PAD * 2;

      pill.style.transition = 'none';
      pill.style.left   = left + 'px';
      pill.style.top    = top  + 'px';
      pill.style.width  = w    + 'px';
      pill.style.height = PILL_H + 'px';
      pill.style.transform = 'scaleX(1) scaleY(1)';
      pill.style.borderRadius = '40px';
      pill.offsetHeight;
    }

    function slidePill(idx) {
      const iw   = itemWidth();
      const left = barLeft() + iw * idx - PAD;
      const w    = iw + PAD * 2;
      pill.style.transition =
        'left 0.46s cubic-bezier(0.4,0,0.2,1), width 0.46s cubic-bezier(0.4,0,0.2,1)';
      pill.style.left  = left + 'px';
      pill.style.width = w    + 'px';
    }

    /* ── Blob animation state ── */
    const blobs = [
      { x: 0.15, y: 0.30, hue: 320, sx: 0.00031, sy: 0.00023, px: 0.0, py: 1.5, r: 0.52 },
      { x: 0.78, y: 0.20, hue:  55, sx: 0.00027, sy: 0.00034, px: 2.1, py: 0.8, r: 0.46 },
      { x: 0.50, y: 0.70, hue: 155, sx: 0.00019, sy: 0.00028, px: 4.2, py: 3.1, r: 0.48 },
      { x: 0.20, y: 0.80, hue: 210, sx: 0.00035, sy: 0.00021, px: 1.0, py: 4.7, r: 0.44 },
      { x: 0.75, y: 0.50, hue: 275, sx: 0.00022, sy: 0.00038, px: 3.3, py: 2.4, r: 0.42 },
      { x: 0.55, y: 0.35, hue: 185, sx: 0.00040, sy: 0.00018, px: 5.5, py: 0.3, r: 0.38 },
    ];

    // Offscreen grain canvas (generated once)
    const grainCanvas = document.createElement('canvas');
    grainCanvas.width = grainCanvas.height = 256;
    const gc = grainCanvas.getContext('2d');
    const id = gc.createImageData(256, 256);
    for (let i = 0; i < id.data.length; i += 4) {
      const v = Math.random() * 255 | 0;
      id.data[i] = id.data[i+1] = id.data[i+2] = v;
      id.data[i+3] = 255;
    }
    gc.putImageData(id, 0, 0);

    function drawRoundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawFrame(t) {
      const W = canvas.width, H = canvas.height;

      // 1. Dark base
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = '#1a0030';
      ctx.fillRect(0, 0, W, H);

      // 2. Blobs
      ctx.globalCompositeOperation = 'screen';
      blobs.forEach(b => {
        const hue = (b.hue + t * 0.015) % 360;
        const cx  = (b.x + Math.sin(t * b.sx + b.px) * 0.22) * W;
        const cy  = (b.y + Math.cos(t * b.sy + b.py) * 0.18) * H;
        const rad = b.r * Math.min(W, H);
        const g   = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad);
        g.addColorStop(0,   `hsla(${hue},90%,68%,0.9)`);
        g.addColorStop(0.5, `hsla(${hue},85%,58%,0.4)`);
        g.addColorStop(1,   `hsla(${hue},80%,50%,0)`);
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx, cy, rad, 0, Math.PI * 2);
        ctx.fill();
      });

      // 3. Grain (tiled, semi-transparent)
      ctx.globalCompositeOperation = 'overlay';
      ctx.globalAlpha = 0.28;
      const pat = ctx.createPattern(grainCanvas, 'repeat');
      ctx.fillStyle = pat;
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;

      // 4. Blue nav bar (drawn on canvas so glass refracts it)
      ctx.globalCompositeOperation = 'source-over';
      const bx = barLeft(), by = barTop();

      // Bar shadow
      ctx.shadowColor   = 'rgba(0,0,40,0.45)';
      ctx.shadowBlur    = 24;
      ctx.shadowOffsetY = 6;
      drawRoundRect(ctx, bx, by, BAR_W, BAR_H, BAR_R);
      ctx.fillStyle = '#1d4ed8';
      ctx.fill();
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur  = 0;
      ctx.shadowOffsetY = 0;

      // Nav labels
      ctx.font      = '600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const iw = itemWidth();
      pages.forEach((label, i) => {
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.fillText(label, bx + iw * i + iw / 2, by + BAR_H / 2);
      });

      requestAnimationFrame(drawFrame);
    }

    /* ── Click & nav logic ── */
    function goTo(idx) {
      if (idx === current || animating) return;
      animating = true;
      current = idx;

      // Smoosh
      pill.style.transition    = 'transform 0.18s cubic-bezier(0.4,0,0.6,1), border-radius 0.18s ease';
      pill.style.transform     = 'scaleX(1.14) scaleY(0.68)';
      pill.style.borderRadius  = '55px';

      glassLabel.classList.add('fading');

      setTimeout(() => slidePill(idx), 55);

      setTimeout(() => {
        pill.style.transition   = 'transform 0.24s cubic-bezier(0.18,1.5,0.4,1), border-radius 0.24s ease';
        pill.style.transform    = 'scaleX(0.90) scaleY(1.14)';
        pill.style.borderRadius = '46px';
      }, 290);

      setTimeout(() => {
        pill.style.transition   = 'transform 0.18s cubic-bezier(0.4,0,0.2,1), border-radius 0.18s ease';
        pill.style.transform    = 'scaleX(1) scaleY(1)';
        pill.style.borderRadius = '40px';
        glassLabel.textContent  = pages[idx];
        glassLabel.classList.remove('fading');
        animating = false;
      }, 480);
    }

    overlay.querySelectorAll('.click-area').forEach(area => {
      area.addEventListener('click', () => goTo(parseInt(area.dataset.idx)));
    });

    window.addEventListener('resize', () => {
      resize();
      snapPill(current);
    });

    /* ── Boot ── */
    resize();
    requestAnimationFrame(drawFrame);

    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        snapPill(0);

        liquidGL({
          snapshot: 'body',
          target:   '.glass-pill',
          resolution: 2.0,
          refraction: 0.04,
          bevelDepth: 0.06,
          bevelWidth: 0.22,
          frost:    0,
          shadow:   true,
          specular: true,
          tilt:     false,
          reveal:  'fade',
        });

        // Tell liquidGL to watch the canvas for updates
        liquidGL.registerDynamic('#bgCanvas');

      }, 200);
    });

    window.addEventListener('load', () => {
      snapPill(0);
      positionOverlay();
      liquidGL.syncWith();
    });
  </script>
</body>
</html>
