<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background-color: #c040e0;
      background-image:
        radial-gradient(ellipse at var(--b1x) var(--b1y), #ff4db8 0%, transparent 55%),
        radial-gradient(ellipse at var(--b2x) var(--b2y), #ffe033 0%, transparent 50%),
        radial-gradient(ellipse at var(--b3x) var(--b3y), #33ff99 0%, transparent 52%),
        radial-gradient(ellipse at var(--b4x) var(--b4y), #3399ff 0%, transparent 54%),
        radial-gradient(ellipse at var(--b5x) var(--b5y), #aa44ff 0%, transparent 50%),
        radial-gradient(ellipse at var(--b6x) var(--b6y), #00eeff 0%, transparent 48%);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.38;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
    }

    /* ── Blue nav bar — static, always visible, NEVER changes ── */
    .nav-bar {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 520px;
      height: 58px;
      border-radius: 29px;
      background: #1d4ed8;
      z-index: 10;
      display: flex;
      align-items: center;
    }

    .nav-item {
      flex: 1;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: rgba(255, 255, 255, 0.55);
      white-space: nowrap;
      user-select: none;
      /* No active state — bar is always static */
    }

    /* ── Glass pill wrapper — handles left/width sliding ── */
    /*    transition only on position, NOT transform                */
    .glass-pill-wrapper {
      position: fixed;
      top: 50%;
      height: 80px;
      z-index: 20;
      pointer-events: none;
      /* left + width driven by JS, transition for slide */
      transition:
        left  0.45s cubic-bezier(0.4, 0, 0.2, 1),
        width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      transform: translateY(-50%);
    }

    /* ── Glass pill itself — handles the smoosh via scaleX/scaleY ── */
    .glass-pill {
      width: 100%;
      height: 100%;
      border-radius: 40px;
      /* transform-origin center so it smooshes symmetrically */
      transform-origin: center center;
      transform: scaleX(1) scaleY(1);
      transition: transform 0s, border-radius 0s;
      will-change: transform;
    }

    .glass-inner {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .glass-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.95);
      letter-spacing: 0.02em;
      white-space: nowrap;
      transition: opacity 0.12s ease;
    }

    .glass-label.fading { opacity: 0; }

    /* ── Click overlay ── */
    .click-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 520px;
      height: 58px;
      border-radius: 29px;
      z-index: 999;
      display: flex;
      align-items: stretch;
    }

    .click-area {
      flex: 1;
      cursor: pointer;
    }

    @media (max-width: 580px) {
      .nav-bar, .click-overlay { width: 92vw; }
    }
  </style>
</head>
<body>

  <!-- Blue bar — fully static, never touched by JS -->
  <div class="nav-bar" id="navBar">
    <div class="nav-item" data-idx="0">About Me</div>
    <div class="nav-item" data-idx="1">Projects</div>
    <div class="nav-item" data-idx="2">Skills</div>
    <div class="nav-item" data-idx="3">Contact</div>
  </div>

  <!-- Glass wrapper moves left/width. Inner pill does the smoosh. -->
  <div class="glass-pill-wrapper" id="glassPillWrapper">
    <div class="glass-pill" id="glassPill">
      <div class="glass-inner">
        <span class="glass-label" id="glassLabel">About Me</span>
      </div>
    </div>
  </div>

  <!-- Invisible click zones -->
  <div class="click-overlay">
    <div class="click-area" data-idx="0"></div>
    <div class="click-area" data-idx="1"></div>
    <div class="click-area" data-idx="2"></div>
    <div class="click-area" data-idx="3"></div>
  </div>

  <script src="scripts/html2canvas.min.js"></script>
  <script src="scripts/liquidGL.js"></script>
  <script>
    /* ── Background animation ── */
    const basePos = [
      [15, 30], [78, 20], [50, 70],
      [20, 80], [75, 50], [55, 35],
    ];
    const blobDefs = [
      { phase: [0.0, 1.5], speed: [0.00031, 0.00023] },
      { phase: [2.1, 0.8], speed: [0.00027, 0.00034] },
      { phase: [4.2, 3.1], speed: [0.00019, 0.00028] },
      { phase: [1.0, 4.7], speed: [0.00035, 0.00021] },
      { phase: [3.3, 2.4], speed: [0.00022, 0.00038] },
      { phase: [5.5, 0.3], speed: [0.00040, 0.00018] },
    ];

    blobDefs.forEach((_, i) => {
      document.body.style.setProperty(`--b${i+1}x`, `${basePos[i][0]}%`);
      document.body.style.setProperty(`--b${i+1}y`, `${basePos[i][1]}%`);
    });

    function animBg(t) {
      blobDefs.forEach((b, i) => {
        const nx = basePos[i][0] + Math.sin(t * b.speed[0] + b.phase[0]) * 22;
        const ny = basePos[i][1] + Math.cos(t * b.speed[1] + b.phase[1]) * 18;
        document.body.style.setProperty(`--b${i+1}x`, `${nx}%`);
        document.body.style.setProperty(`--b${i+1}y`, `${ny}%`);
      });
      requestAnimationFrame(animBg);
    }
    requestAnimationFrame(animBg);

    /* ── Nav state ── */
    const pages     = ['About Me', 'Projects', 'Skills', 'Contact'];
    let   current   = 0;
    let   animating = false;

    const navItems    = document.querySelectorAll('.nav-item');
    const wrapper     = document.getElementById('glassPillWrapper');
    const pill        = document.getElementById('glassPill');
    const glassLabel  = document.getElementById('glassLabel');
    const clickAreas  = document.querySelectorAll('.click-area');

    const PAD = 14; // how much glass overhangs each side of the nav item

    function getItemRect(idx) {
      return navItems[idx].getBoundingClientRect();
    }

    function snapPill(idx) {
      const r = getItemRect(idx);
      wrapper.style.transition = 'none';
      wrapper.style.left  = (r.left - PAD) + 'px';
      wrapper.style.width = (r.width + PAD * 2) + 'px';
      pill.style.transition = 'none';
      pill.style.transform = 'scaleX(1) scaleY(1)';
      pill.style.borderRadius = '40px';
      pill.offsetHeight; // force reflow
      wrapper.style.transition = '';
    }

    function goTo(idx) {
      if (idx === current || animating) return;
      animating = true;
      current = idx;

      const r = getItemRect(idx);
      const targetLeft  = r.left - PAD;
      const targetWidth = r.width + PAD * 2;

      /* ── Smoosh phase ── */
      // Squish: scale down vertically, stretch horizontally (like taffy pulling)
      pill.style.transition = 'transform 0.18s cubic-bezier(0.4,0,0.6,1), border-radius 0.18s ease';
      pill.style.transform  = 'scaleX(1.12) scaleY(0.72)';
      pill.style.borderRadius = '50px';

      // Label fade out
      glassLabel.classList.add('fading');

      // Slide wrapper to new position (starts immediately, overlaps with smoosh)
      setTimeout(() => {
        wrapper.style.left  = targetLeft + 'px';
        wrapper.style.width = targetWidth + 'px';
      }, 60);

      /* ── Unsmoosh phase — arrives at destination ── */
      setTimeout(() => {
        pill.style.transition = 'transform 0.22s cubic-bezier(0.2,1.4,0.4,1), border-radius 0.22s ease';
        pill.style.transform  = 'scaleX(0.92) scaleY(1.1)';
        pill.style.borderRadius = '44px';
      }, 280);

      // Settle
      setTimeout(() => {
        pill.style.transition = 'transform 0.18s cubic-bezier(0.4,0,0.2,1), border-radius 0.18s ease';
        pill.style.transform  = 'scaleX(1) scaleY(1)';
        pill.style.borderRadius = '40px';

        // Label fade in with new text
        glassLabel.textContent = pages[idx];
        glassLabel.classList.remove('fading');

        animating = false;
      }, 460);
    }

    clickAreas.forEach(area => {
      area.addEventListener('click', () => goTo(parseInt(area.dataset.idx)));
    });

    /* ── Init liquidGL ── */
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        snapPill(0);

        liquidGL({
          target: '.glass-pill',
          refraction: 0.03,
          bevelDepth: 0.06,
          bevelWidth: 0.22,
          frost: 0,
          shadow: true,
          specular: true,
          tilt: false,
          reveal: 'fade',
        });
      }, 200);
    });

    window.addEventListener('load', () => {
      snapPill(0);
      liquidGL.syncWith();
    });
  </script>
</body>
</html>
