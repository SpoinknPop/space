<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Noise & Dynamic Waves</title>
    <style>
        /* CSS Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505; /* Deep dark modern background */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* The Canvas where the JS waves are drawn */
        #waveCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* The Modern Noise Overlay */
        /* Generates a fractal noise SVG and overlays it with CSS */
        .noise-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none; /* Allows clicking through the noise to the canvas/content */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.12; /* Keeps the grain subtle and modern */
            mix-blend-mode: overlay; /* Blends the grain with the colors behind it */
        }

        /* Sample Content to show how to layer text over the background */
        .content {
            position: relative;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
            text-align: center;
            pointer-events: none;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            background: linear-gradient(135deg, #ffffff, #a3a3a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <!-- HTML5 Canvas for the shapes -->
    <canvas id="waveCanvas"></canvas>
    
    <!-- CSS Grain/Noise Overlay -->
    <div class="noise-overlay"></div>

    <!-- Foreground Content -->
    <div class="content">
        <h1>Modern Noise</h1>
    </div>

    <script>
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let waves = [];

        // A vibrant, modern color palette
        const colors = [
            'rgba(255, 42, 84, 0.6)',   // Vibrant Pink/Red
            'rgba(0, 242, 254, 0.6)',   // Cyan
            'rgba(127, 0, 255, 0.6)',   // Purple
            'rgba(255, 127, 0, 0.6)',   // Orange
            'rgba(79, 172, 254, 0.6)'   // Light Blue
        ];

        // Resize canvas to fill the screen
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initWaves();
        }

        // Initialize wave properties
        function initWaves() {
            waves = [];
            const numWaves = 5; // Number of overlapping shapes

            for (let i = 0; i < numWaves; i++) {
                waves.push({
                    y: height / 2, // Base vertical center
                    length: 0.002 + Math.random() * 0.003, // Wave width (frequency)
                    amplitude: 100 + Math.random() * 200, // Wave height
                    speed: 0.01 + Math.random() * 0.015, // Movement speed
                    color: colors[i % colors.length], // Assign color
                    offset: Math.random() * Math.PI * 2, // Starting phase
                    verticalShift: (Math.random() - 0.5) * 300 // Shift up or down
                });
            }
        }

        // The animation loop
        function animate() {
            // Clear canvas entirely each frame for transparent fluid shapes
            ctx.clearRect(0, 0, width, height);
            
            // Use screen blend mode for a glowing, modern intersection effect
            ctx.globalCompositeOperation = 'screen';

            waves.forEach(wave => {
                ctx.beginPath();
                
                // Start drawing from the left side, way off-screen
                ctx.moveTo(0, height); 
                
                // Draw the top curve of the wave across the screen width
                for (let x = 0; x <= width; x += 15) { // 15px step for performance
                    // Calculate Y position using sine math
                    const y = wave.y + wave.verticalShift + Math.sin(x * wave.length + wave.offset) * wave.amplitude;
                    ctx.lineTo(x, y);
                }

                // Close the path by drawing down to the bottom right, then bottom left
                ctx.lineTo(width, height);
                ctx.lineTo(0, height);
                ctx.closePath();

                // Fill the shape
                ctx.fillStyle = wave.color;
                ctx.fill();

                // Move the wave forward by its speed
                wave.offset += wave.speed;
            });

            // Loop the animation
            requestAnimationFrame(animate);
        }

        // Event listeners
        window.addEventListener('resize', resize);

        // Bootstrap the environment
        resize();
        animate();
    </script>
</body>
</html>
