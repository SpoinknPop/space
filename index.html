<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --glass-bg:      rgba(255,255,255,0.10);
      --glass-border:  rgba(255,255,255,0.20);
      --active-bg:     rgba(255,255,255,0.20);
      --active-border: rgba(255,255,255,0.40);
      --text-dim:      rgba(255,255,255,0.50);
      --text-bright:   rgba(255,255,255,0.97);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      /* Restored default cursor */
      cursor: default;
    }

    body {
      background-color: #c040e0;
      background-image:
        radial-gradient(ellipse at var(--b1x) var(--b1y), #ff4db8 0%, transparent 55%),
        radial-gradient(ellipse at var(--b2x) var(--b2y), #ffe033 0%, transparent 50%),
        radial-gradient(ellipse at var(--b3x) var(--b3y), #33ff99 0%, transparent 52%),
        radial-gradient(ellipse at var(--b4x) var(--b4y), #3399ff 0%, transparent 54%),
        radial-gradient(ellipse at var(--b5x) var(--b5y), #aa44ff 0%, transparent 50%),
        radial-gradient(ellipse at var(--b6x) var(--b6y), #00eeff 0%, transparent 48%);
    }

    /* Grainy Texture Overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      z-index: 1;
      opacity: 0.2;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .nav-wrap {
      position: fixed;
      bottom: 40px; 
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }

    .nav-bar {
      display: flex; align-items: center; gap: 4px;
      padding: 8px;
      border-radius: 50px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      position: relative;
    }

    .nav-indicator {
      position: absolute; top: 8px;
      height: calc(100% - 16px);
      border-radius: 40px;
      background: var(--active-bg);
      border: 1px solid var(--active-border);
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      pointer-events: none; z-index: 0;
    }

    .nav-btn {
      position: relative; z-index: 1;
      display: flex; align-items: center; gap: 8px;
      padding: 10px 24px;
      border-radius: 40px; border: none; background: transparent;
      color: var(--text-dim);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem; font-weight: 500;
      cursor: pointer; /* Restored pointer cursor for buttons */
      white-space: nowrap;
      transition: color 0.3s;
    }
    .nav-btn.active { color: var(--text-bright); }

    .page-content {
      position: fixed; inset: 0; z-index: 3;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; pointer-events: none;
    }
    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(3rem, 10vw, 6rem);
      color: rgba(255,255,255,0.9);
      text-align: center; line-height: 1;
      margin-bottom: 0.5rem;
    }
    .page-sub {
      font-size: 0.9rem; color: rgba(255,255,255,0.5);
      letter-spacing: 0.3em; text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="page-content">
    <div class="page-title" id="pageTitle">About Me</div>
    <div class="page-sub">Creative Portfolio</div>
  </div>

  <div class="nav-wrap">
    <nav class="nav-bar" id="navBar">
      <div class="nav-indicator" id="navIndicator"></div>
      <button class="nav-btn active" data-idx="0">About</button>
      <button class="nav-btn" data-idx="1">Projects</button>
      <button class="nav-btn" data-idx="2">Skills</button>
      <button class="nav-btn" data-idx="3">Contact</button>
    </nav>
  </div>

  <script>
    /* --- Background Animation Logic --- */
    const basePos = [[15,30], [78,20], [50,70], [20,80], [75,50], [55,35]];
    const blobDefs = [
      { phase: [0.0, 1.5], speed: [0.0004, 0.0003] },
      { phase: [2.1, 0.8], speed: [0.0003, 0.0004] },
      { phase: [4.2, 3.1], speed: [0.0002, 0.0003] },
      { phase: [1.0, 4.7], speed: [0.0004, 0.0003] },
      { phase: [3.3, 2.4], speed: [0.0003, 0.0004] },
      { phase: [5.5, 0.3], speed: [0.0005, 0.0002] },
    ];

    function animBg(t) {
      blobDefs.forEach((b, i) => {
        const nx = basePos[i][0] + Math.sin(t * b.speed[0] + b.phase[0]) * 20;
        const ny = basePos[i][1] + Math.cos(t * b.speed[1] + b.phase[1]) * 15;
        document.body.style.setProperty(`--b${i+1}x`, `${nx}%`);
        document.body.style.setProperty(`--b${i+1}y`, `${ny}%`);
      });
      requestAnimationFrame(animBg);
    }
    requestAnimationFrame(animBg);

    /* --- Navigation Logic --- */
    const pages = ['About Me', 'Projects', 'Skills', 'Contact'];
    const btns = document.querySelectorAll('.nav-btn');
    const indicator = document.getElementById('navIndicator');
    const titleEl = document.getElementById('pageTitle');

    function updateIndicator(idx) {
      const btn = btns[idx];
      if (btn) {
        indicator.style.left = btn.offsetLeft + 'px';
        indicator.style.width = btn.offsetWidth + 'px';
      }
    }

    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        
        // Update Active States
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // Update Title
        titleEl.textContent = pages[idx];
        
        // Move Glass Indicator
        updateIndicator(idx);
      });
    });

    // Handle initial state and responsive resizing
    window.onload = () => updateIndicator(0);
    window.addEventListener('resize', () => {
      const activeBtn = document.querySelector('.nav-btn.active');
      if (activeBtn) updateIndicator(parseInt(activeBtn.dataset.idx));
    });
  </script>
</body>
</html>
