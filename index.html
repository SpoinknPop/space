<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #c8cdd6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Scrollable background sections ── */
    .bg-section {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .bg-section:nth-child(1) { background: #c8cdd6; }
    .bg-section:nth-child(2) { background: #bcc3ce; }
    .bg-section:nth-child(3) { background: #c2c8d2; }
    .bg-section:nth-child(4) { background: #c5cad3; }

    .bg-text {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: rgba(0,0,0,0.04);
      user-select: none;
      pointer-events: none;
      text-align: center;
    }

    /* ── Glass bar ── */
    .glass-bar {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 480px;
      height: 68px;
      border-radius: 34px;
      z-index: 100;
      pointer-events: none;
    }

    @media (max-width: 540px) {
      .glass-bar { width: 92vw; }
      .ui-overlay { width: 92vw !important; }
    }

    /* Label inside bar */
    .bar-inner {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 0.75rem;
      gap: 0.25rem;
      pointer-events: none;
    }

    /* Active pill indicator inside the bar */
    .active-pill {
      position: absolute;
      height: 52px;
      border-radius: 26px;
      background: #2563eb;
      transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1), width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1;
      top: 50%;
      transform: translateY(-50%);
    }

    /* Nav item text shown inside bar */
    .bar-nav-item {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      height: 52px;
      padding: 0 1.1rem;
      border-radius: 26px;
      flex-shrink: 0;
    }

    .bar-nav-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: rgba(255,255,255,0.5);
      transition: color 0.3s ease;
      white-space: nowrap;
    }

    .bar-nav-item.active .bar-nav-label {
      color: #fff;
    }

    /* ── Buttons outside the bar ── */
    .ui-overlay {
      position: fixed;
      top: calc(50% + 50px);
      left: 50%;
      transform: translateX(-50%);
      width: 480px;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      z-index: 200;
    }

    .tab-btn {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      border: 1px solid rgba(0,0,0,0.12);
      background: rgba(255,255,255,0.35);
      color: rgba(0,0,0,0.55);
      cursor: pointer;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: background 0.2s, color 0.2s, transform 0.15s;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }

    .tab-btn:hover {
      background: rgba(255,255,255,0.55);
      color: rgba(0,0,0,0.8);
    }

    .tab-btn:active { transform: scale(0.93); }

    .tab-btn.active {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }
  </style>
</head>
<body>

  <div class="bg-section"><div class="bg-text">About Me</div></div>
  <div class="bg-section"><div class="bg-text">Projects</div></div>
  <div class="bg-section"><div class="bg-text">Skills</div></div>
  <div class="bg-section"><div class="bg-text">Contact</div></div>

  <!-- Glass bar: only decorative label inside, no clickable children -->
  <div class="glass-bar">
    <div class="bar-inner" id="barInner">
      <div class="active-pill" id="activePill"></div>
      <!-- nav items injected by JS -->
    </div>
  </div>

  <!-- Clickable buttons below the bar -->
  <div class="ui-overlay" id="tabRow"></div>

  <script src="scripts/html2canvas.min.js"></script>
  <script src="scripts/liquidGL.js"></script>
  <script>
    const pages = [
      { label: "About Me"  },
      { label: "Projects"  },
      { label: "Skills"    },
      { label: "Contact"   },
    ];

    let current = 0;
    let lensList = [];

    const barInner  = document.getElementById("barInner");
    const activePill = document.getElementById("activePill");
    const tabRow    = document.getElementById("tabRow");

    // Build mirrored nav items inside bar (visual only)
    const barItems = pages.map((p, i) => {
      const el = document.createElement("div");
      el.className = "bar-nav-item" + (i === 0 ? " active" : "");
      el.innerHTML = `<span class="bar-nav-label">${p.label}</span>`;
      barInner.appendChild(el);
      return el;
    });

    // Build clickable buttons below bar
    pages.forEach((p, i) => {
      const btn = document.createElement("button");
      btn.className = "tab-btn" + (i === 0 ? " active" : "");
      btn.textContent = p.label;
      btn.addEventListener("click", () => goTo(i));
      tabRow.appendChild(btn);
    });

    function movePill(idx) {
      const item = barItems[idx];
      // Position pill over the active bar-nav-item
      activePill.style.left   = item.offsetLeft + "px";
      activePill.style.width  = item.offsetWidth + "px";
    }

    function updateTabs(idx) {
      tabRow.querySelectorAll(".tab-btn").forEach((b, i) => {
        b.classList.toggle("active", i === idx);
      });
      barItems.forEach((el, i) => {
        el.classList.toggle("active", i === idx);
      });
      movePill(idx);
    }

    function goTo(idx) {
      if (idx === current) return;
      current = idx;
      updateTabs(current);
    }

    document.addEventListener("DOMContentLoaded", () => {
      const glassEffect = liquidGL({
        target: ".glass-bar",
        refraction: 0,
        bevelDepth: 0.052,
        bevelWidth: 0.211,
        frost: 2,
        shadow: true,
        specular: true,
        tilt: false,
        reveal: "fade",
        on: {
          init() {
            // Set pill position after liquidGL has rendered
            movePill(0);
          }
        }
      });

      lensList = Array.isArray(glassEffect) ? glassEffect : [glassEffect];
    });

    window.addEventListener("load", () => {
      liquidGL.syncWith();
      movePill(0);
    });
  </script>
</body>
</html>
