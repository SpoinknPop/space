<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* ── Animated mesh gradient background (CSS, captured by html2canvas) ── */
    body {
      background-color: #c040e0;
      background-image:
        radial-gradient(ellipse at var(--b1x) var(--b1y), #ff4db8 0%, transparent 55%),
        radial-gradient(ellipse at var(--b2x) var(--b2y), #ffe033 0%, transparent 50%),
        radial-gradient(ellipse at var(--b3x) var(--b3y), #33ff99 0%, transparent 52%),
        radial-gradient(ellipse at var(--b4x) var(--b4y), #3399ff 0%, transparent 54%),
        radial-gradient(ellipse at var(--b5x) var(--b5y), #aa44ff 0%, transparent 50%),
        radial-gradient(ellipse at var(--b6x) var(--b6y), #00eeff 0%, transparent 48%);
    }

    /* Grain overlay — sits on top of bg, below everything else */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.38;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
    }

    /* ── Blue nav bar ── */
    .nav-bar {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 520px;
      height: 58px;
      border-radius: 29px;
      background: #1d4ed8;
      z-index: 10;
      display: flex;
      align-items: center;
    }

    .nav-item {
      flex: 1;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: rgba(255, 255, 255, 0.5);
      white-space: nowrap;
      user-select: none;
      transition: color 0.3s ease;
    }

    /* Active label goes invisible — glass sits on top showing it */
    .nav-item.active { color: transparent; }

    /* ── Glass pill — liquidGL target, BIGGER than nav bar ── */
    .glass-pill {
      position: fixed;
      top: 50%;
      height: 80px; /* taller than bar's 58px */
      border-radius: 40px;
      z-index: 20;
      transform: translateY(-50%);
      /* left + width driven by JS */
      transition:
        left   0.46s cubic-bezier(0.4, 0, 0.2, 1),
        width  0.46s cubic-bezier(0.4, 0, 0.2, 1),
        border-radius 0.18s ease;
      pointer-events: none;
    }

    .glass-inner {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .glass-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.95);
      letter-spacing: 0.02em;
      white-space: nowrap;
      transition: opacity 0.15s ease;
    }

    .glass-label.fading { opacity: 0; }

    /* ── Invisible click overlay, exactly over the nav bar ── */
    .click-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 520px;
      height: 58px;
      border-radius: 29px;
      z-index: 999;
      display: flex;
      align-items: stretch;
    }

    .click-area {
      flex: 1;
      cursor: pointer;
    }

    @media (max-width: 580px) {
      .nav-bar, .click-overlay { width: 92vw; }
    }
  </style>
</head>
<body>

  <!-- Blue bar with labels -->
  <div class="nav-bar" id="navBar">
    <div class="nav-item active" data-idx="0">About Me</div>
    <div class="nav-item"        data-idx="1">Projects</div>
    <div class="nav-item"        data-idx="2">Skills</div>
    <div class="nav-item"        data-idx="3">Contact</div>
  </div>

  <!-- Glass pill — liquidGL target -->
  <div class="glass-pill" id="glassPill">
    <div class="glass-inner">
      <span class="glass-label" id="glassLabel">About Me</span>
    </div>
  </div>

  <!-- Transparent click zones on top -->
  <div class="click-overlay">
    <div class="click-area" data-idx="0"></div>
    <div class="click-area" data-idx="1"></div>
    <div class="click-area" data-idx="2"></div>
    <div class="click-area" data-idx="3"></div>
  </div>

  <script src="scripts/html2canvas.min.js"></script>
  <script src="scripts/liquidGL.js"></script>
  <script>
    /* ── Animate background blobs via CSS custom properties ── */
    const blobCount = 6;
    const blobs = [
      { phase: [0.0, 1.5], speed: [0.00031, 0.00023], range: 0.30 },
      { phase: [2.1, 0.8], speed: [0.00027, 0.00034], range: 0.28 },
      { phase: [4.2, 3.1], speed: [0.00019, 0.00028], range: 0.25 },
      { phase: [1.0, 4.7], speed: [0.00035, 0.00021], range: 0.32 },
      { phase: [3.3, 2.4], speed: [0.00022, 0.00038], range: 0.27 },
      { phase: [5.5, 0.3], speed: [0.00040, 0.00018], range: 0.29 },
    ];

    // Starting positions
    const basePos = [
      [15, 30], [78, 20], [50, 70],
      [20, 80], [75, 50], [55, 35],
    ];

    function animBg(t) {
      blobs.forEach((b, i) => {
        const nx = basePos[i][0] + Math.sin(t * b.speed[0] + b.phase[0]) * b.range * 40;
        const ny = basePos[i][1] + Math.cos(t * b.speed[1] + b.phase[1]) * b.range * 40;
        const n = i + 1;
        document.body.style.setProperty(`--b${n}x`, `${nx}%`);
        document.body.style.setProperty(`--b${n}y`, `${ny}%`);
      });
      requestAnimationFrame(animBg);
    }

    // Set initial CSS vars before page renders
    blobs.forEach((_, i) => {
      const n = i + 1;
      document.body.style.setProperty(`--b${n}x`, `${basePos[i][0]}%`);
      document.body.style.setProperty(`--b${n}y`, `${basePos[i][1]}%`);
    });

    requestAnimationFrame(animBg);

    /* ── Nav logic ── */
    const pages      = ['About Me', 'Projects', 'Skills', 'Contact'];
    let   current    = 0;

    const pill        = document.getElementById('glassPill');
    const glassLabel  = document.getElementById('glassLabel');
    const navItems    = document.querySelectorAll('.nav-item');
    const clickAreas  = document.querySelectorAll('.click-area');

    function positionPill(idx, instant) {
      const rect = navItems[idx].getBoundingClientRect();
      // Pill is wider/taller than bar — grow outward by 14px each side
      const pad = 14;
      const targetLeft  = rect.left - pad;
      const targetWidth = rect.width + pad * 2;

      if (instant) {
        const prev = pill.style.transition;
        pill.style.transition = 'none';
        pill.style.left  = targetLeft + 'px';
        pill.style.width = targetWidth + 'px';
        pill.offsetHeight;
        pill.style.transition = prev;
      } else {
        pill.style.left  = targetLeft + 'px';
        pill.style.width = targetWidth + 'px';
      }
    }

    function goTo(idx) {
      if (idx === current) return;
      current = idx;

      // Smoosh: squish horizontally as it launches
      pill.style.borderRadius = '8px';

      setTimeout(() => positionPill(idx, false), 50);

      // Bounce back round
      setTimeout(() => { pill.style.borderRadius = '44px'; }, 380);
      setTimeout(() => { pill.style.borderRadius = '40px'; }, 520);

      // Label crossfade
      glassLabel.classList.add('fading');
      setTimeout(() => {
        glassLabel.textContent = pages[idx];
        glassLabel.classList.remove('fading');
      }, 160);

      navItems.forEach((el, i) => el.classList.toggle('active', i === idx));
    }

    clickAreas.forEach(area => {
      area.addEventListener('click', () => goTo(parseInt(area.dataset.idx)));
    });

    /* ── Init liquidGL after DOM is ready ── */
    document.addEventListener('DOMContentLoaded', () => {
      // Give bg a moment to paint before snapshot
      setTimeout(() => {
        positionPill(0, true);

        liquidGL({
          target: '.glass-pill',
          refraction: 0.03,
          bevelDepth: 0.06,
          bevelWidth: 0.22,
          frost: 0,
          shadow: true,
          specular: true,
          tilt: false,
          reveal: 'fade',
        });
      }, 200);
    });

    window.addEventListener('load', () => {
      positionPill(0, true);
      liquidGL.syncWith();
    });
  </script>
</body>
</html>
