<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>liquidGL Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a14;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ── Scrollable background sections ── */
    .bg-section {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .bg-section:nth-child(1) { background: linear-gradient(135deg, #1a0533 0%, #3d1278 50%, #0d1f6b 100%); }
    .bg-section:nth-child(2) { background: linear-gradient(135deg, #033a2e 0%, #0f7a5a 50%, #1a3d6b 100%); }
    .bg-section:nth-child(3) { background: linear-gradient(135deg, #3d0a0a 0%, #8b1a6b 50%, #1a0d3d 100%); }

    .bg-text {
      font-size: clamp(4rem, 12vw, 9rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      color: rgba(255,255,255,0.06);
      user-select: none;
      pointer-events: none;
      text-align: center;
      line-height: 1;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.5;
      pointer-events: none;
    }

    .bg-section:nth-child(1) .blob-a { width: 400px; height: 400px; background: #5533ff; top: -80px; left: -60px; }
    .bg-section:nth-child(1) .blob-b { width: 350px; height: 350px; background: #cc44ff; bottom: -60px; right: -40px; }
    .bg-section:nth-child(2) .blob-a { width: 380px; height: 380px; background: #00cc88; top: -60px; right: -80px; }
    .bg-section:nth-child(2) .blob-b { width: 320px; height: 320px; background: #0088ff; bottom: -80px; left: -60px; }
    .bg-section:nth-child(3) .blob-a { width: 420px; height: 420px; background: #ff3366; top: -100px; left: 20%; }
    .bg-section:nth-child(3) .blob-b { width: 300px; height: 300px; background: #aa00ff; bottom: -60px; right: 10%; }

    /* ── Glass bar (liquidGL target) ── */
    .glass-bar {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 640px;
      height: 72px;
      border-radius: 36px;
      z-index: 9999;
    }

    @media (max-width: 700px) {
      .glass-bar { width: 90vw; }
    }

    /* Content inside the bar */
    .bar-content {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem 0 1.5rem;
      gap: 1rem;
    }

    .bar-label {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex: 1;
      overflow: hidden;
    }

    .label-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .label-info { overflow: hidden; }

    .label-title {
      font-size: 0.92rem;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: opacity 0.25s ease;
    }

    .label-sub {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
      margin-top: 1px;
      white-space: nowrap;
      transition: opacity 0.25s ease;
    }

    /* Preset buttons */
    .bar-tabs {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-shrink: 0;
    }

    .tab-btn {
      padding: 0.3rem 0.7rem;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .tab-btn:hover {
      background: rgba(255,255,255,0.16);
      color: rgba(255,255,255,0.9);
    }

    .tab-btn:active { transform: scale(0.94); }

    .tab-btn.active {
      background: rgba(255,255,255,0.22);
      color: rgba(255,255,255,1);
      border-color: rgba(255,255,255,0.4);
    }

    /* Fading label swap */
    .fading .label-icon,
    .fading .label-title,
    .fading .label-sub {
      opacity: 0;
      transform: translateY(4px);
    }
  </style>
</head>
<body>

  <!-- Scrollable background -->
  <div class="bg-section">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="bg-text">GLASS</div>
  </div>
  <div class="bg-section">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="bg-text">LIQUID</div>
  </div>
  <div class="bg-section">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="bg-text">REFRACT</div>
  </div>

  <!-- Glass bar -->
  <div class="glass-bar">
    <div class="bar-content" id="barContent">
      <div class="bar-label">
        <span class="label-icon" id="labelIcon">✦</span>
        <div class="label-info">
          <div class="label-title" id="labelTitle">Default</div>
          <div class="label-sub" id="labelSub">Balanced refraction + bevel</div>
        </div>
      </div>
      <div class="bar-tabs" id="tabRow"></div>
    </div>
  </div>

  <script src="scripts/html2canvas.min.js"></script>
  <script src="scripts/liquidGL.js"></script>
  <script>
    const presets = [
      {
        label: "Default", sub: "Balanced refraction", icon: "✦",
        options: { refraction: 0, bevelDepth: 0.052, bevelWidth: 0.211, frost: 2, shadow: true, specular: true }
      },
      {
        label: "Alien", sub: "Sci-fi deep bevel", icon: "⬡",
        options: { refraction: 0.073, bevelDepth: 0.2, bevelWidth: 0.156, frost: 2, shadow: true, specular: false }
      },
      {
        label: "Pulse", sub: "Flat pane, wide bevel", icon: "◉",
        options: { refraction: 0.03, bevelDepth: 0, bevelWidth: 0.273, frost: 0, shadow: false, specular: false }
      },
      {
        label: "Frost", sub: "Privacy-glass blur", icon: "❄",
        options: { refraction: 0, bevelDepth: 0.035, bevelWidth: 0.119, frost: 0.9, shadow: true, specular: true }
      },
      {
        label: "Edge", sub: "Thin bevel + highlights", icon: "◈",
        options: { refraction: 0.047, bevelDepth: 0.136, bevelWidth: 0.076, frost: 2, shadow: true, specular: false }
      },
    ];

    let current = 0;
    let glassEffect = null;
    let lensList = [];

    // Build tab buttons
    const tabRow = document.getElementById("tabRow");
    presets.forEach((p, i) => {
      const btn = document.createElement("button");
      btn.className = "tab-btn" + (i === 0 ? " active" : "");
      btn.textContent = p.label;
      btn.addEventListener("click", () => goTo(i));
      tabRow.appendChild(btn);
    });

    function updateTabs(idx) {
      tabRow.querySelectorAll(".tab-btn").forEach((b, i) => {
        b.classList.toggle("active", i === idx);
      });
    }

    function updateLabel(idx) {
      const content = document.getElementById("barContent");
      content.classList.add("fading");
      setTimeout(() => {
        document.getElementById("labelIcon").textContent = presets[idx].icon;
        document.getElementById("labelTitle").textContent = presets[idx].label;
        document.getElementById("labelSub").textContent = presets[idx].sub;
        content.classList.remove("fading");
      }, 260);
    }

    function applyPreset(idx) {
      const opts = presets[idx].options;
      lensList.forEach(ln => {
        if (!ln) return;
        Object.assign(ln.options, opts);
        if ("shadow" in opts) ln.setShadow(opts.shadow);
        ln.setTilt(false);
      });
    }

    function goTo(idx) {
      if (idx === current) return;
      current = idx;
      updateTabs(current);
      updateLabel(current);
      applyPreset(current);
    }

    document.addEventListener("DOMContentLoaded", () => {
      glassEffect = liquidGL({
        target: ".glass-bar",
        refraction: 0,
        bevelDepth: 0.052,
        bevelWidth: 0.211,
        frost: 2,
        shadow: true,
        specular: true,
        tilt: false,
        reveal: "fade",
      });

      lensList = Array.isArray(glassEffect) ? glassEffect : [glassEffect];
    });

    window.addEventListener("load", () => {
      liquidGL.syncWith();
    });
  </script>
</body>
</html>
