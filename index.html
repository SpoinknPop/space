<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ᯓ★</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --glass-bg:      rgba(255,255,255,0.10);
      --glass-border:  rgba(255,255,255,0.20);
      --active-bg:     rgba(255,255,255,0.20);
      --active-border: rgba(255,255,255,0.40);
      --text-dim:      rgba(255,255,255,0.50);
      --text-bright:   rgba(255,255,255,0.97);
      --btn-brightness: 1;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      cursor: default;
    }

    body {
      background-color: #c040e0;
      background-image:
        radial-gradient(ellipse at var(--b1x) var(--b1y), #ff4db8 0%, transparent 55%),
        radial-gradient(ellipse at var(--b2x) var(--b2y), #ffe033 0%, transparent 50%),
        radial-gradient(ellipse at var(--b3x) var(--b3y), #33ff99 0%, transparent 52%),
        radial-gradient(ellipse at var(--b4x) var(--b4y), #3399ff 0%, transparent 54%),
        radial-gradient(ellipse at var(--b5x) var(--b5y), #aa44ff 0%, transparent 50%),
        radial-gradient(ellipse at var(--b6x) var(--b6y), #00eeff 0%, transparent 48%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Grainy Texture Overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      z-index: 1;
      opacity: 0.15;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* Layout Containers */
    .page-content {
      position: relative;
      z-index: 10;
      width: 90%;
      max-width: 1000px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      /* Adjusted from -8vh to -12vh to move the content up slightly */
      margin-top: -12vh;
    }

    .hero-section {
      text-align: left;
      margin-bottom: 0.5rem;
    }

    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      color: rgba(255,255,255,0.95);
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .page-sub {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.4em;
      text-transform: uppercase;
    }

    #mainContent {
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 3rem;
      align-items: flex-start; 
    }

    .about-text {
      color: rgba(255,255,255,0.85);
      font-size: 1.05rem;
      line-height: 1.6;
      font-weight: 300;
    }

    .intro-para {
        margin-bottom: 1.5rem;
    }

    /* Table Styling */
    .info-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 12px;
        overflow: hidden;
    }

    .info-table td {
        padding: 10px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        font-size: 0.95rem;
    }

    .info-table tr:last-child td {
        border-bottom: none;
    }

    .label-cell {
        color: rgba(255, 255, 255, 0.4);
        width: 35%;
        font-weight: 500;
        text-transform: uppercase;
        font-size: 0.75rem !important;
        letter-spacing: 0.1em;
    }

    .value-cell {
        color: rgba(255, 255, 255, 0.9);
        font-family: 'DM Sans', sans-serif;
    }

    /* Clock Styling */
    .clock-container {
      margin-bottom: 1rem;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      backdrop-filter: blur(5px);
      width: 100%;
    }

    #clock-time {
      font-family: 'DM Sans', monospace;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.95);
      font-size: 1rem;
      letter-spacing: 0.05em;
    }

    .clock-label {
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 2px;
    }

    .social-column {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 24px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      border-radius: 100px; 
      text-decoration: none;
      color: white;
      font-weight: 500;
      font-size: 0.9rem;
      transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      background-origin: border-box;
      background-clip: border-box;
      position: relative;
    }

    .social-btn::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 100px;
      background: white;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .social-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    }

    .social-btn:hover::after {
      opacity: 0.15;
    }

    .btn-icon-png {
      width: 20px;
      height: 20px;
      object-fit: contain;
    }

    .btn-spotify { background-color: #1DB954; background-image: linear-gradient(135deg, #1DB954 0%, #111111 100%); }
    .btn-discord { background-color: #5865F2; background-image: linear-gradient(135deg, #5865F2 0%, #3a45c3 100%); }
    .btn-valorant { background-color: #ff4655; background-image: linear-gradient(135deg, #ff4655 0%, #bd3944 100%); }
    .btn-github { background-color: #9333ea; background-image: linear-gradient(135deg, #7c3aed 0%, #c026d3 100%); }
    .btn-roblox { background-color: #000000; background-image: linear-gradient(135deg, #000000 0%, #444444 100%); }

    .btn-label { display: flex; align-items: center; gap: 14px; z-index: 2; }
    .btn-arrow { opacity: 0.7; font-size: 0.8rem; z-index: 2; display: flex; align-items: center; }

    /* Navigation Bar */
    .nav-wrap {
      position: fixed;
      bottom: 40px; 
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      width: auto;
      max-width: 90vw;
    }

    .nav-bar {
      display: flex; align-items: center; gap: 4px;
      padding: 8px;
      border-radius: 50px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      position: relative;
    }

    .nav-indicator {
      position: absolute; top: 8px;
      height: calc(100% - 16px);
      border-radius: 40px;
      background: var(--active-bg);
      border: 1px solid var(--active-border);
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      pointer-events: none; z-index: 0;
    }

    .nav-btn {
      position: relative; z-index: 1;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 24px;
      border-radius: 40px; border: none; background: transparent;
      color: var(--text-dim);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem; font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.3s;
    }
    .nav-btn.active { color: var(--text-bright); }
    .nav-btn i { width: 16px; height: 16px; }

    /* Mobile Adaptability */
    @media (max-width: 768px) {
      .content-grid { grid-template-columns: 1fr; gap: 2rem; }
      .page-content { padding-bottom: 120px; overflow-y: auto; max-height: 85vh; margin-top: 0; }
      body { align-items: flex-start; padding-top: 40px; }
      
      .nav-wrap { bottom: 20px; width: 95vw; }
      .nav-bar { gap: 2px; padding: 4px; justify-content: space-around; }
      .nav-btn { padding: 12px; gap: 0; flex: 1; justify-content: center; flex-direction: column; font-size: 0.7rem; }
      .nav-btn span { display: block; margin-top: 4px; }
      .nav-btn i { width: 20px; height: 20px; }
      .nav-indicator { top: 4px; height: calc(100% - 8px); }
    }
  </style>
</head>
<body>

  <main class="page-content">
    <div class="hero-section">
      <div class="page-sub" id="pageSub">Creative Portfolio</div>
      <h1 class="page-title" id="pageTitle">About Me</h1>
    </div>

    <div id="mainContent">
      <!-- Content injected by JS -->
    </div>
  </main>

  <div class="nav-wrap">
    <nav class="nav-bar" id="navBar">
      <div class="nav-indicator" id="navIndicator"></div>
      <button class="nav-btn active" data-idx="0"><i data-lucide="user"></i><span>About</span></button>
      <button class="nav-btn" data-idx="1"><i data-lucide="layout"></i><span>Projects</span></button>
      <button class="nav-btn" data-idx="2"><i data-lucide="zap"></i><span>Skills</span></button>
      <button class="nav-btn" data-idx="3"><i data-lucide="mail"></i><span>Contact</span></button>
    </nav>
  </div>

  <script>
    const contentData = {
      0: `
        <div class="content-grid">
          <section class="about-text">
            <p class="intro-para">
              ᯓ★ Hello! You can call me Ace or Spoink :D I'm currently studying game development and design in high school. My interests include linguistics, crochet, typology, and I'm a superfan of Mitski :3
            </p>
            
            <table class="info-table">
              <tr><td class="label-cell">Function</td><td class="value-cell">TiN</td></tr>
              <tr><td class="label-cell">Enneagram</td><td class="value-cell">594</td></tr>
              <tr><td class="label-cell">Chromatype</td><td class="value-cell">AmbCyaCor</td></tr>
              <tr><td class="label-cell">Temperament</td><td class="value-cell">Phlegmatic</td></tr>
              <tr><td class="label-cell">Big Five</td><td class="value-cell">rcUe[I]</td></tr>
              <tr><td class="label-cell">Psychosophy</td><td class="value-cell">LVEF<sup>4343</sup></td></tr>
              <tr><td class="label-cell">Alignment</td><td class="value-cell">True Neutral</td></tr>
            </table>
          </section>
          
          <aside class="social-side-col">
            <div class="clock-container">
              <i data-lucide="clock" style="width: 16px; height: 16px; color: rgba(255,255,255,0.6);"></i>
              <div style="display: flex; flex-direction: column; align-items: flex-start;">
                <span class="clock-label">Local Time (EST)</span>
                <span id="clock-time">00:00:00 AM</span>
              </div>
            </div>
            
            <div class="social-column">
              <a href="#" target="_blank" class="social-btn btn-spotify">
                <span class="btn-label"><img src="icons/spotify.png" class="btn-icon-png" alt="Spotify"> Spotify</span>
                <span class="btn-arrow"><i data-lucide="external-link"></i></span>
              </a>
              <a href="https://discord.gg/5QAyBHYbEM" target="_blank" class="social-btn btn-discord">
                <span class="btn-label"><img src="icons/discord.png" class="btn-icon-png" alt="Discord"> Discord</span>
                <span class="btn-arrow"><i data-lucide="external-link"></i></span>
              </a>
              <a href="https://github.com/SpoinknPop" target="_blank" class="social-btn btn-github">
                <span class="btn-label"><img src="icons/github.png" class="btn-icon-png" alt="GitHub"> GitHub</span>
                <span class="btn-arrow"><i data-lucide="external-link"></i></span>
              </a>
              <a href="https://tracker.gg/valorant/profile/riot/Spoink%23123" target="_blank" class="social-btn btn-valorant">
                <span class="btn-label"><img src="icons/valorant.png" class="btn-icon-png" alt="Valorant"> Valorant</span>
                <span class="btn-arrow"><i data-lucide="external-link"></i></span>
              </a>
              <a href="https://www.roblox.com/users/2036318698/profile" target="_blank" class="social-btn btn-roblox">
                <span class="btn-label"><img src="icons/roblox.png" class="btn-icon-png" alt="Roblox"> Roblox</span>
                <span class="btn-arrow"><i data-lucide="external-link"></i></span>
              </a>
            </div>
          </aside>
        </div>
      `,
      1: `<div class="grid-view"><div class="card"><h3>Project A</h3><p>Description here.</p></div></div>`,
      2: `<div class="grid-view"><div class="card"><h3>Skills</h3><p>Skill list here.</p></div></div>`,
      3: `<div class="about-text"><p>Contact me at hello@example.com</p></div>`
    };

    /* --- Clock Logic --- */
    function updateClock() {
      const clockEl = document.getElementById('clock-time');
      if (!clockEl) return;
      
      const options = {
        timeZone: 'America/New_York',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: true
      };
      
      const estTime = new Intl.DateTimeFormat('en-US', options).format(new Date());
      clockEl.textContent = estTime;
    }
    setInterval(updateClock, 1000);

    /* --- Background Animation Logic --- */
    const basePos = [[15,30], [78,20], [50,70], [20,80], [75,50], [55,35]];
    const blobDefs = [
      { phase: [0.0, 1.5], speed: [0.0004, 0.0003] },
      { phase: [2.1, 0.8], speed: [0.0003, 0.0004] },
      { phase: [4.2, 3.1], speed: [0.0002, 0.0003] },
      { phase: [1.0, 4.7], speed: [0.0004, 0.0003] },
      { phase: [3.3, 2.4], speed: [0.0003, 0.0004] },
      { phase: [5.5, 0.3], speed: [0.0005, 0.0002] },
    ];

    function animBg(t) {
      blobDefs.forEach((b, i) => {
        const nx = basePos[i][0] + Math.sin(t * b.speed[0] + b.phase[0]) * 20;
        const ny = basePos[i][1] + Math.cos(t * b.speed[1] + b.phase[1]) * 15;
        document.body.style.setProperty(`--b${i+1}x`, `${nx}%`);
        document.body.style.setProperty(`--b${i+1}y`, `${ny}%`);
      });
      requestAnimationFrame(animBg);
    }
    requestAnimationFrame(animBg);

    /* --- Navigation Logic --- */
    const pages = ['About Me', 'Featured Projects', 'Core Skills', 'Get In Touch'];
    const btns = document.querySelectorAll('.nav-btn');
    const indicator = document.getElementById('navIndicator');
    const titleEl = document.getElementById('pageTitle');
    const contentContainer = document.getElementById('mainContent');

    function updateIndicator(idx) {
      const btn = btns[idx];
      if (btn) {
        indicator.style.left = btn.offsetLeft + 'px';
        indicator.style.width = btn.offsetWidth + 'px';
      }
    }

    function switchPage(idx) {
      contentContainer.style.opacity = 0;
      contentContainer.style.transform = 'translateY(10px)';
      titleEl.style.opacity = 0;

      setTimeout(() => {
        titleEl.textContent = pages[idx];
        contentContainer.innerHTML = contentData[idx];
        lucide.createIcons();
        if (idx === 0) updateClock(); 
        contentContainer.style.opacity = 1;
        contentContainer.style.transform = 'translateY(0px)';
        titleEl.style.opacity = 1;
      }, 300);
    }

    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        switchPage(idx);
        updateIndicator(idx);
      });
    });

    window.onload = () => {
      updateIndicator(0);
      contentContainer.innerHTML = contentData[0];
      lucide.createIcons();
      updateClock();
    };

    window.addEventListener('resize', () => {
      const activeBtn = document.querySelector('.nav-btn.active');
      if (activeBtn) updateIndicator(parseInt(activeBtn.dataset.idx));
    });
  </script>
</body>
</html>
